site_name: gem-skill
site_description: Generate and manage Claude Code AI skills from Ruby gem documentation
site_author: Dewayne VanHoozer
site_url: https://madbomber.github.io/gem-skill
copyright: Copyright &copy; 2026 Dewayne VanHoozer

repo_name: madbomber/gem-skill
repo_url: https://github.com/madbomber/gem-skill
edit_uri: edit/main/docs/

theme:
  name: material

  palette:
    - scheme: default
      primary: deep purple
      accent: purple
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: deep purple
      accent: purple
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

  font:
    text: Roboto
    code: Roboto Mono

  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.path
    - navigation.indexes
    - navigation.top
    - toc.follow
    - search.suggest
    - search.highlight
    - search.share
    - header.autohide
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - content.tooltips
    - content.action.edit
    - content.action.view

plugins:
  - search:
      separator: '[\s\-,:!=\[\]()"`/]+|\.(?!\d)|&[lg]t;|(?!\b)(?=[A-Z][a-z])'

markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - toc:
      permalink: true
      title: On this page
  - pymdownx.betterem:
      smart_enable: all
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.emoji:
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
      emoji_index: !!python/name:material.extensions.emoji.twemoji
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.magiclink:
      repo_url_shorthand: true
      user: madbomber
      repo: gem-skill
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/madbomber/gem-skill
      name: gem-skill on GitHub
    - icon: fontawesome/solid/gem
      link: https://rubygems.org/gems/gem-skill
      name: gem-skill on RubyGems

nav:
  - Home: index.md
  - Installation: installation.md
  - Configuration: configuration.md
  - Commands:
    - gem skill: commands/gem-skill.md
    - bundle skill: commands/bundle-skill.md
  - How It Works: how-it-works.md
  - Cache: cache.md
  - Skill Files: skill-files.md
